<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>گالری کامل - دیار نیوز</title>
    <link rel="stylesheet" href="gallery.css" />
</head>
<body>

<div class="gallery-app">

    <!-- ===== هدر ===== -->
    <header class="gallery-header">
        <div>
            <h1>📁 گالری کامل دیار نیوز</h1>
            <p>مدیریت عکس، موزیک، ویدئو و فایل‌ها در پوشه‌های مجزا</p>
        </div>
        <a href="../news/" class="header-btn">📰 دیار نیوز</a>
    </header>

    <!-- ===== تب‌ها ===== -->
    <nav class="gallery-tabs">
        <button class="tab-btn active" data-tab="picture">🖼️ عکس‌ها</button>
        <button class="tab-btn" data-tab="music">🎵 موزیک</button>
        <button class="tab-btn" data-tab="video">🎬 ویدئوها</button>
        <button class="tab-btn" data-tab="file">📄 فایل‌ها</button>
        <button class="tab-btn" data-tab="all">📦 همه</button>
    </nav>

    <!-- ===== بخش آپلود ===== -->
    <section class="upload-section">
        <div class="upload-zone" id="dropZone">
            <div class="upload-icon">📤</div>
            <h3 id="uploadTitle">فایل‌ها را اینجا بکشید یا کلیک کنید</h3>
            <p id="uploadHint">به‌طور خودکار در پوشه مناسب قرار می‌گیرند</p>
            <label class="upload-btn">
                📁 انتخاب فایل
                <input type="file" id="fileInput" multiple />
            </label>
            <div class="upload-status" id="uploadStatus">✅ آماده آپلود</div>
            <div class="progress-container" id="progressContainer">
                <div class="progress-bar" id="progressBar"></div>
                <span class="progress-text" id="progressText">۰%</span>
            </div>
        </div>
    </section>

    <!-- ===== ابزارها ===== -->
    <div class="toolbar">
        <div class="search-wrapper">
            <input type="text" id="searchInput" placeholder="🔍 جستجو در همه پوشه‌ها..." />
        </div>
        <div class="toolbar-stats">
            <span id="fileCount">۰ فایل</span>
            <button id="refreshBtn" class="icon-btn" title="به‌روزرسانی">🔄</button>
            <button id="selectAllBtn" class="icon-btn">✅</button>
            <button id="deleteSelectedBtn" class="icon-btn danger">🗑️</button>
        </div>
    </div>

    <!-- ===== گالری ===== -->
    <div class="gallery-grid" id="galleryGrid">
        <div class="loading-state">
            <span class="loader"></span>
            <p>در حال بارگذاری...</p>
        </div>
    </div>

    <!-- ===== فوتر ===== -->
    <footer class="gallery-footer">
        <p>© ۱۴۰۵ گالری کامل دیار نیوز | پوشه‌های جداگانه برای هر نوع فایل</p>
    </footer>

</div>

<!-- ===== پیام ===== -->
<div class="toast" id="toast"></div>

<script src="gallery.js"></script>
</body>
</html>
