<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>نوار اخبار دیار قدمگاه</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,body{
    width:100%;
    height:40px;
    overflow:hidden;
    background:#0b3d2e;
    font-family:tahoma,Arial,sans-serif;
}

#ticker{
    width:100%;
    height:40px;
    overflow:hidden;
    position:relative;
}

#track{
    position:absolute;
    top:0;
    right:0;
    height:40px;
    display:flex;
    align-items:center;
    white-space:nowrap;
}

.item{
    display:inline-flex;
    align-items:center;
    height:30px;
    margin:5px 8px;
    padding:0 15px;
    background:rgba(255,255,255,.12);
    border-radius:20px;
    border-right:3px solid #d4af37;
    color:#fff;
    text-decoration:none;
    font-size:13px;
}

.dot{
    width:7px;
    height:7px;
    border-radius:50%;
    background:#ffd700;
    margin-left:8px;
}

</style>
</head>

<body>

<div id="ticker">
    <div id="track">
        <span class="item">
            <span class="dot"></span>
            در حال دریافت اخبار...
        </span>
    </div>
</div>


<script>

const track = document.getElementById("track");

const jsonUrl =
"https://maghool51.github.io/diyar-news/news.json?v=" + Date.now();


let x = window.innerWidth;

let speed = 0.5;

let trackWidth = 0;


function showNews(news){

    let html="";

    news.forEach(n=>{

        html += `
        <a class="item" href="${n.link || '#'}" target="_blank">
        <span class="dot"></span>
        ${n.title}
        </a>
        `;

    });


    track.innerHTML = html + html;


    setTimeout(()=>{

        trackWidth = track.scrollWidth / 2;

        x = window.innerWidth;

        move();

    },200);

}



function move(){

    x -= speed;

    if(x < -trackWidth){

        x = window.innerWidth;

    }


    track.style.transform =
    "translateX("+x+"px)";


    requestAnimationFrame(move);

}



fetch(jsonUrl)

.then(r=>r.json())

.then(data=>{

    if(data.news && data.news.length){

        showNews(data.news);

    }

})

.catch(()=>{

    track.innerHTML=
    `
    <span class="item">
    <span class="dot"></span>
    اخبار دیار قدمگاه
    </span>
    `;

    move();

});


</script>

</body>
</html>
