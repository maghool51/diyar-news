<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width,initial-scale=1">

<title>News Ticker | دیار قدمگاه</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

html,
body{

width:100%;

height:40px;

overflow:hidden;

background:#0b3d2e;

font-family:
Tahoma,
Arial,
sans-serif;

}

body{

display:flex;

align-items:center;

}

#ticker{

width:100%;

height:40px;

overflow:hidden;

position:relative;

display:flex;

align-items:center;

}

#track{

display:flex;

align-items:center;

white-space:nowrap;

will-change:transform;

}

.item{

display:inline-flex;

align-items:center;

margin:0 12px;

padding:4px 14px;

background:rgba(255,255,255,.08);

border-radius:20px;

border-right:3px solid #d4af37;

color:#fff;

font-size:13px;

text-decoration:none;

flex-shrink:0;

transition:.25s;

}

.item:hover{

background:#d4af37;

color:#222;

}

.dot{

width:7px;

height:7px;

border-radius:50%;

background:#ffd700;

margin-left:8px;

flex-shrink:0;

}

</style>

</head>

<body>

<div id="ticker">

<div id="track">

<span class="item">

در حال دریافت اخبار...

</span>

</div>

</div>
