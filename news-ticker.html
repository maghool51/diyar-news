<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>نوار اخبار فوری دیار قدمگاه</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}


body{

background:transparent;
font-family:tahoma,Arial,sans-serif;
direction:rtl;

}


.news-ticker{

width:100%;
height:45px;
background:#b00000;
color:white;
display:flex;
align-items:center;
overflow:hidden;
border-radius:8px;

}



/* عنوان ثابت */

.ticker-title{

height:100%;
background:#800000;
display:flex;
align-items:center;
padding:0 15px;
font-size:14px;
font-weight:bold;
white-space:nowrap;
z-index:10;

}


.blink{

color:#ffd700;
margin-left:8px;
animation:blink 1s infinite;

}




/* محل حرکت */

.ticker-box{

flex:1;
height:100%;
overflow:hidden;
position:relative;

}



/* متن اخبار */

.ticker-content{

position:absolute;
right:0;
height:100%;

display:flex;
align-items:center;

white-space:nowrap;

animation:newsMove 140s linear infinite;

}



.news-item{

color:white;
font-size:14px;
padding:0 45px;

}



.separator{

color:#ffd700;

}




/* حرکت خبر
شروع با مکث کوتاه
سپس حرکت راست به چپ
*/

@keyframes newsMove{


0%{

transform:translateX(0);

}


4%{

transform:translateX(0);

}


100%{

transform:translateX(100%);

}


}




@keyframes blink{

50%{

opacity:.25;

}

}



.ticker-content:hover{

animation-play-state:paused;

}




@media(max-width:600px){

.ticker-title{

font-size:12px;
padding:0 10px;

}


.news-item{

font-size:12px;
padding:0 25px;

}

}


</style>

</head>


<body>


<div class="news-ticker">


<div class="ticker-title">

<span class="blink">🔴</span>

خبر فوری

</div>



<div class="ticker-box">


<div id="tickerContent" class="ticker-content">

در حال دریافت اخبار...

</div>


</div>


</div>




<script>


const url =
"https://raw.githubusercontent.com/maghool51/diyar-news/main/news.json";



fetch(url+"?v="+Date.now())


.then(response=>response.json())


.then(data=>{


let html="";



(data.news || []).slice(0,20).forEach(item=>{


if(item.title){


html += `

<span class="news-item">
🔹 ${item.title}
</span>

<span class="separator">
◆
</span>

`;

}


});



const ticker =
document.getElementById("tickerContent");



ticker.innerHTML = html + html;



})


.catch(()=>{


document.getElementById("tickerContent").innerHTML=

`
<span class="news-item">
اخبار در حال بروزرسانی است
</span>
`;

});


</script>



</body>

</html>
