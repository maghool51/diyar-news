<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>News Ticker</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:40px;overflow:hidden;background:#0b3d2e;font-family:tahoma,Arial,sans-serif}
#ticker{position:relative;width:100%;height:40px;overflow:hidden}
#track{position:absolute;left:-9999px;top:0;height:40px;display:flex;align-items:center;white-space:nowrap;will-change:transform}
.item{display:inline-flex;align-items:center;margin:5px 8px;padding:0 14px;height:30px;background:rgba(255,255,255,.12);border-right:3px solid #d4af37;border-radius:20px;color:#fff;text-decoration:none;font-size:13px;flex-shrink:0}
.dot{width:7px;height:7px;border-radius:50%;background:#ffd700;margin-left:8px}
</style>
</head>
<body>
<div id="ticker"><div id="track"><span class="item"><span class="dot"></span>در حال دریافت اخبار...</span></div></div>
<script>
const track=document.getElementById('track');
let pos=0,anim,w=0,speed=0.35;
function start(){
 cancelAnimationFrame(anim);
 w=track.scrollWidth/2;
 pos=-w;
 function step(){
   pos+=speed;
   if(pos>=0) pos=-w;
   track.style.transform='translateX('+pos+'px)';
   anim=requestAnimationFrame(step);
 }
 step();
}
function build(news){
 let html='';
 news.forEach(n=>{
   html+=`<a class="item" href="${n.link||'#'}" target="_blank"><span class="dot"></span>${n.title}</a>`;
 });
 track.innerHTML=html.repeat(4);
 setTimeout(start,100);
}
fetch('https://maghool51.github.io/diyar-news/news.json?t='+Date.now(),{cache:'no-store'})
.then(r=>r.json())
.then(d=>build(d.news||[]))
.catch(()=>build([{title:'اخبار دیار قدمگاه',link:'#'}]));
setInterval(()=>{
fetch('https://maghool51.github.io/diyar-news/news.json?t='+Date.now(),{cache:'no-store'})
.then(r=>r.json()).then(d=>build(d.news||[]));
},300000);
</script>
</body></html>
