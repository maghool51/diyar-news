<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>نوار اخبار فوری دیار قدمگاه</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:transparent;
    direction:rtl;
    font-family:tahoma,Arial,sans-serif;
}


/* نوار اصلی */
.news-ticker{

    width:100%;
    height:45px;
    background:#b00000;
    color:white;
    overflow:hidden;
    display:flex;
    align-items:center;
    border-radius:8px;

}


/* عنوان ثابت */
.ticker-title{

    height:100%;
    background:#800000;
    padding:0 15px;
    display:flex;
    align-items:center;
    font-size:14px;
    font-weight:bold;
    white-space:nowrap;
    z-index:5;

}


.blink{

    color:#ffd700;
    margin-left:8px;
    animation:blink 1s infinite;

}


/* محل حرکت */
.ticker-box{

    flex:1;
    height:100%;
    overflow:hidden;
    position:relative;

}



/* محتوای متحرک */
.ticker-content{

    position:absolute;
    height:100%;
    display:flex;
    align-items:center;
    white-space:nowrap;

    animation:newsMove 220s linear infinite;

}


/* هر خبر */
.news-item{

    color:white;
    font-size:14px;
    padding:0 45px;

}


/* جداکننده */
.separator{

    color:#ffd700;

}



/* حرکت راست به چپ */
@keyframes newsMove{


0%{

    transform:translateX(-20%);

}


100%{

    transform:translateX(100%);

}


}



/* چشمک چراغ */
@keyframes blink{

50%{

opacity:.25;

}

}



/* توقف با موس */
.ticker-content:hover{

animation-play-state:paused;

}



@media(max-width:600px){

.ticker-title{

font-size:12px;
padding:0 10px;

}


.news-item{

font-size:12px;
padding:0 25px;

}

}


</style>

</head>


<body>


<div class="news-ticker">


<div class="ticker-title">

<span class="blink">🔴</span>

خبر فوری

</div>


<div class="ticker-box">


<div id="tickerContent" class="ticker-content">

در حال دریافت اخبار...

</div>


</div>


</div>




<script>


const url =
"https://raw.githubusercontent.com/maghool51/diyar-news/main/news.json";



fetch(url+"?v="+Date.now())

.then(response=>response.json())

.then(data=>{


let news=data.news || [];

let html="";


// تعداد کمتر برای نمایش سریع‌تر

news.slice(0,20).forEach(item=>{


if(item.title){


html +=

`<span class="news-item">
🔹 ${item.title}
</span>
<span class="separator">◆</span>`;

}


});



// تکرار برای حرکت پیوسته

document.getElementById("tickerContent").innerHTML =
html + html;



})


.catch(()=>{


document.getElementById("tickerContent").innerHTML=

`<span class="news-item">
اخبار در حال بروزرسانی است
</span>`;


});


</script>


</body>

</html>
