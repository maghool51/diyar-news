<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>نوار اخبار | دیار قدمگاه</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,body{
    width:100%;
    height:40px;
    overflow:hidden;
    background:#0b3d2e;
    font-family:tahoma,Arial,sans-serif;
}

#ticker{
    width:100%;
    height:40px;
    display:flex;
    align-items:center;
    overflow:hidden;
    position:relative;
}

#track{
    display:flex;
    align-items:center;
    white-space:nowrap;
    position:absolute;
    right:0;
    top:0;
    height:40px;
    will-change:transform;
}

.item{

    display:inline-flex;
    align-items:center;

    margin:0 8px;

    padding:3px 14px;

    background:rgba(255,255,255,.12);

    border-radius:20px;

    border-right:3px solid #d4af37;

    color:white;

    font-size:13px;

    text-decoration:none;

    height:30px;

}

.item:hover{

    background:#d4af37;
    color:#222;

}

.dot{

    width:7px;
    height:7px;

    border-radius:50%;

    background:#ffd700;

    margin-left:8px;

}

</style>

</head>


<body>


<div id="ticker">

    <div id="track">

        <span class="item">
            <span class="dot"></span>
            در حال دریافت اخبار...
        </span>

    </div>

</div>



<script>

const track = document.getElementById("track");


const jsonUrl =
"https://maghool51.github.io/diyar-news/news.json?t=" + Date.now();



let position = 0;

let speed = 0.7;

let animation;



function createNews(news){


    let html="";


    news.forEach(item=>{

        html += `

        <a class="item"
        href="${item.link || '#'}"
        target="_blank">

        <span class="dot"></span>

        ${item.title}

        </a>

        `;

    });


    // تکرار برای حرکت بدون پرش

    track.innerHTML = html + html;


}



function move(){


    position -= speed;


    const width = track.scrollWidth / 2;


    if(Math.abs(position) >= width){

        position = 0;

    }


    track.style.transform =
    "translateX(" + position + "px)";


    animation =
    requestAnimationFrame(move);

}



function loadNews(){


fetch(jsonUrl,{cache:"no-store"})

.then(r=>r.json())

.then(data=>{


    if(data.news && data.news.length){

        createNews(data.news);

    }


    cancelAnimationFrame(animation);


    position = 0;


    move();


})


.catch(()=>{


    track.innerHTML = `

    <span class="item">

    <span class="dot"></span>

    اخبار دیار قدمگاه

    </span>

    `;


    move();


});

}



loadNews();


// هر ۵ دقیقه بروزرسانی

setInterval(loadNews,300000);



</script>


</body>

</html>
