<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>نوار اخبار دیار قدمگاه</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,body{
    width:100%;
    height:40px;
    overflow:hidden;
    background:#0b3d2e;
    font-family:tahoma,Arial,sans-serif;
}

#ticker{
    width:100%;
    height:40px;
    overflow:hidden;
    position:relative;
    display:flex;
    align-items:center;
}

#track{
    position:absolute;
    right:0;
    top:0;
    height:40px;
    display:flex;
    align-items:center;
    white-space:nowrap;
    will-change:transform;
}

.item{

    display:inline-flex;
    align-items:center;

    height:30px;

    margin:0 8px;

    padding:3px 15px;

    background:rgba(255,255,255,.12);

    border-radius:20px;

    border-right:3px solid #d4af37;

    color:#fff;

    text-decoration:none;

    font-size:13px;

}

.item:hover{

    background:#d4af37;
    color:#222;

}

.dot{

    width:7px;
    height:7px;

    border-radius:50%;

    background:#ffd700;

    margin-left:8px;

    flex-shrink:0;

}

</style>

</head>


<body>


<div id="ticker">

<div id="track">

<span class="item">
<span class="dot"></span>
در حال دریافت اخبار...
</span>

</div>

</div>



<script>

const track = document.getElementById("track");


const jsonUrl =
"https://maghool51.github.io/diyar-news/news.json?t=" + Date.now();


let position = 0;

let speed = 0.8;

let width = 0;


let animationId;



function buildNews(news){


    let html="";


    news.forEach(item=>{


        html += `

        <a class="item" 
        href="${item.link || '#'}"
        target="_blank">

        <span class="dot"></span>

        ${item.title}

        </a>

        `;


    });


    // تکرار برای حرکت پیوسته

    track.innerHTML = html + html;


    setTimeout(()=>{

        width = track.scrollWidth / 2;

        position = -width;

        move();

    },100);


}



function move(){


    // حرکت راست به چپ فارسی

    position += speed;


    if(position >= 0){

        position = -width;

    }


    track.style.transform =
    "translateX(" + position + "px)";


    animationId =
    requestAnimationFrame(move);


}



function loadNews(){


    fetch(jsonUrl,{cache:"no-store"})

    .then(response=>{

        if(!response.ok)
            throw new Error();

        return response.json();

    })

    .then(data=>{


        cancelAnimationFrame(animationId);


        if(data.news && data.news.length){

            buildNews(data.news);

        }


    })

    .catch(()=>{


        track.innerHTML=

        `

        <span class="item">

        <span class="dot"></span>

        اخبار دیار قدمگاه

        </span>

        `;


        width=track.scrollWidth;

        position=-width;

        move();


    });


}



loadNews();


// بروزرسانی هر ۵ دقیقه

setInterval(loadNews,300000);


</script>


</body>

</html>
